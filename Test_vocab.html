<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engineer Vocab Master</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --bg: #f4f7f9;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .app-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            box-sizing: border-box;
        }
        .header { text-align: center; color: var(--primary); margin-bottom: 20px; }
        .page { display: none; width: 100%; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Menu Styles */
        .menu-grid { display: grid; gap: 15px; margin-top: 30px; }
        .menu-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: 0.2s;
            border: 2px solid transparent;
        }
        .menu-card:hover { border-color: var(--secondary); transform: scale(1.02); }

        /* Card Styles */
        .card-container { perspective: 1000px; height: 300px; margin-bottom: 20px; cursor: pointer; }
        .card { 
            position: relative; width: 100%; height: 100%; 
            transition: transform 0.6s; transform-style: preserve-3d; 
            border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .card.flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute; width: 100%; height: 100%; 
            backface-visibility: hidden; display: flex; 
            flex-direction: column; justify-content: center; 
            align-items: center; padding: 20px; border-radius: 20px;
            background: white; box-sizing: border-box;
        }
        .card-back { background: var(--secondary); color: white; transform: rotateY(180deg); }

        /* Quiz Styles */
        .quiz-box { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .question { font-size: 24px; font-weight: bold; margin-bottom: 20px; text-align: center; color: var(--secondary); }
        .options-grid { display: grid; gap: 10px; }
        .option-btn {
            padding: 15px; border: 2px solid #eee; border-radius: 12px;
            background: white; cursor: pointer; text-align: left; font-size: 16px; width: 100%;
        }
        .option-btn.correct { background: var(--success) !important; color: white !important; border-color: var(--success) !important; }
        .option-btn.wrong { background: var(--danger) !important; color: white !important; border-color: var(--danger) !important; }

        input[type="text"] {
            width: 100%; padding: 15px; border-radius: 10px; border: 2px solid #ddd;
            font-size: 18px; margin-bottom: 15px; box-sizing: border-box; text-align: center;
        }
        .feedback { margin-top: 15px; font-weight: bold; text-align: center; min-height: 24px; }

        .btn-nav {
            padding: 15px 20px; border: none; border-radius: 10px;
            background: var(--primary); color: white; cursor: pointer; margin-top: 10px; font-weight: bold;
        }
        .home-link { color: var(--secondary); cursor: pointer; text-decoration: underline; display: block; margin-top: 25px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>Engineering Vocab</h1>
        <p>468 Words Challenge</p>
    </div>

    <div id="page-home" class="page active">
        <div class="menu-grid">
            <div class="menu-card" onclick="showPage('flash')">🗂️ Flashcards (การ์ดคำศัพท์)</div>
            <div class="menu-card" onclick="startQuiz('choice')">📝 Multiple Choice (ตัวเลือก 4 ข้อ)</div>
            <div class="menu-card" onclick="startQuiz('fill')">✏️ Fill in Blank (เติมความหมายเอง)</div>
        </div>
    </div>

    <div id="page-flash" class="page">
        <div class="card-container" onclick="this.querySelector('.card').classList.toggle('flipped')">
            <div class="card">
                <div class="card-face">
                    <small id="flash-no">#1</small>
                    <h2 id="flash-vocab" style="font-size: 32px;">accept</h2>
                    <p style="color:#ccc; font-size:12px;">แตะเพื่อดูคำแปล</p>
                </div>
                <div class="card-face card-back">
                    <h2 id="flash-meaning">ยอมรับ</h2>
                </div>
            </div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn-nav" onclick="changeFlash(-1)">ก่อนหน้า</button>
            <button class="btn-nav" onclick="changeFlash(1)">ถัดไป</button>
            <button class="btn-nav" style="grid-column: span 2; background: var(--success);" onclick="randomFlash()">สุ่มคำศัพท์</button>
        </div>
        <span class="home-link" onclick="showPage('home')">กลับหน้าหลัก</span>
    </div>

    <div id="page-choice" class="page">
        <div class="quiz-box">
            <div class="question" id="choice-vocab">Vocabulary</div>
            <div class="options-grid" id="choice-options"></div>
            <div class="feedback" id="choice-feedback"></div>
            <button class="btn-nav" id="choice-next" style="width: 100%; display: none;" onclick="startQuiz('choice')">ข้อถัดไป</button>
        </div>
        <span class="home-link" onclick="showPage('home')">กลับหน้าหลัก</span>
    </div>

    <div id="page-fill" class="page">
        <div class="quiz-box">
            <div class="question" id="fill-vocab">Vocabulary</div>
            <input type="text" id="fill-input" placeholder="พิมพ์ความหมาย..." onkeypress="if(event.key==='Enter') checkFill()">
            <button class="btn-nav" id="btn-check-fill" style="width: 100%; background: var(--success);" onclick="checkFill()">ตรวจคำตอบ</button>
            <div class="feedback" id="fill-feedback"></div>
            <button class="btn-nav" id="fill-next" style="width: 100%; display: none;" onclick="startQuiz('fill')">ข้อถัดไป</button>
        </div>
        <span class="home-link" onclick="showPage('home')">กลับหน้าหลัก</span>
    </div>
</div>

    let currentIdx = 0;
    let quizWord = null;

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        if(pageId === 'flash') updateFlash();
    }

    // Flashcard Logic
    function updateFlash() {
        const item = words[currentIdx];
        document.getElementById('flash-no').innerText = '#' + item[0];
        document.getElementById('flash-vocab').innerText = item[1];
        document.getElementById('flash-meaning').innerText = item[2];
        document.querySelector('.card').classList.remove('flipped');
    }
    function changeFlash(dir) { currentIdx = (currentIdx + dir + words.length) % words.length; updateFlash(); }
    function randomFlash() { currentIdx = Math.floor(Math.random() * words.length); updateFlash(); }

    // Quiz Logic
    function startQuiz(type) {
        showPage(type);
        quizWord = words[Math.floor(Math.random() * words.length)];
        document.getElementById(type + '-vocab').innerText = quizWord[1];
        document.getElementById(type + '-feedback').innerText = '';
        document.getElementById(type + '-next').style.display = 'none';

        if(type === 'choice') {
            const options = [quizWord[2]];
            while(options.length < 4) {
                let rVal = words[Math.floor(Math.random() * words.length)][2];
                if(!options.includes(rVal)) options.push(rVal);
            }
            options.sort(() => Math.random() - 0.5);
            
            const container = document.getElementById('choice-options');
            container.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkChoice(btn, opt);
                container.appendChild(btn);
            });
        } else {
            const input = document.getElementById('fill-input');
            input.value = '';
            input.disabled = false;
            document.getElementById('btn-check-fill').style.display = 'block';
            setTimeout(() => input.focus(), 500);
        }
    }

    function checkChoice(btn, selected) {
        const allBtn = document.querySelectorAll('.option-btn');
        allBtn.forEach(b => b.style.pointerEvents = 'none');
        
        if(selected === quizWord[2]) {
            btn.classList.add('correct');
            document.getElementById('choice-feedback').innerHTML = '<span style="color:var(--success)">✅ ถูกต้อง!</span>';
        } else {
            btn.classList.add('wrong');
            document.getElementById('choice-feedback').innerHTML = `<span style="color:var(--danger)">❌ ผิด! คำตอบคือ: ${quizWord[2]}</span>`;
        }
        document.getElementById('choice-next').style.display = 'block';
    }

    function checkFill() {
        const input = document.getElementById('fill-input');
        const userAns = input.value.trim();
        const correctAns = quizWord[2];
        if(!userAns) return;

        input.disabled = true;
        document.getElementById('btn-check-fill').style.display = 'none';

        if(correctAns.includes(userAns) && userAns.length > 1) {
            document.getElementById('fill-feedback').innerHTML = '<span style="color:var(--success)">✅ ถูกต้อง!</span>';
        } else {
            document.getElementById('fill-feedback').innerHTML = `<span style="color:var(--danger)">❌ คำตอบที่ใกล้เคียงคือ: ${correctAns}</span>`;
        }
        document.getElementById('fill-next').style.display = 'block';
    }
</script>
